name: ci/cd

on: [push]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: python -m pip install ".[dev]"

    - name: Analyse the code with 'pre-commit'
      run: pre-commit run --all-files

    - name: Run tests
      run: python -m unittest discover -v
      env:
          KEENETIC_ENDPOINT: ${{ secrets.KEENETIC_ENDPOINT }}
          KEENETIC_USERNAME: ${{ secrets.KEENETIC_USERNAME }}
          KEENETIC_PASSWORD: ${{ secrets.KEENETIC_PASSWORD }}

  publish:
    name: Upload to PyPi
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/mykeenetic
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: python -m pip install toml build

    - name: Compare package version and git tag
      run: |
        TAG=$(git describe --tags --abbrev=0)
        VERSION=$(python -c "import toml; import pathlib; print(toml.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
        [[ $TAG == $VERSION ]] && echo "VALID=true" >> "$GITHUB_ENV" || echo "VALID=false" >> "$GITHUB_ENV"

    - name: Build
      if: env.VALID == 'true'
      run: python -m build

    - name: Publish
      if: env.VALID == 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
